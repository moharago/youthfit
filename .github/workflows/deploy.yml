name: Deploy to EC2

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ap-southeast-2

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push Docker image
        id: build
        run: |
          ECR_REGISTRY=557809209492.dkr.ecr.ap-southeast-2.amazonaws.com
          IMAGE_TAG=${{ github.sha }}
          IMAGE_URI=$ECR_REGISTRY/youthfit:$IMAGE_TAG
          docker build -t $IMAGE_URI -t $ECR_REGISTRY/youthfit:latest ./backend
          docker push $ECR_REGISTRY/youthfit:$IMAGE_TAG
          docker push $ECR_REGISTRY/youthfit:latest
          echo "image=$IMAGE_URI" >> $GITHUB_OUTPUT

      - name: Deploy to EC2
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ec2-user
          key: ${{ secrets.EC2_SSH_KEY }}
          envs: IMAGE_URI
          script: |
            aws ecr get-login-password --region ap-southeast-2 | \
              docker login --username AWS --password-stdin \
              557809209492.dkr.ecr.ap-southeast-2.amazonaws.com

            docker pull $IMAGE_URI

            docker stop youthfit || true
            docker rm youthfit || true

            docker run -d \
              --name youthfit \
              --restart unless-stopped \
              -p 8000:8000 \
              -v /home/ec2-user/youthfit/backend/data:/app/data \
              --env-file /home/ec2-user/youthfit/backend/.env \
              $IMAGE_URI

            # 헬스체크: 컨테이너 상태 및 /docs 응답 확인
            sleep 5
            for i in 1 2 3 4 5; do
              STATUS=$(docker inspect --format='{{.State.Status}}' youthfit 2>/dev/null)
              if [ "$STATUS" != "running" ]; then
                echo "Container is not running (status: $STATUS)"
                docker logs youthfit
                exit 1
              fi
              if curl -sf http://localhost:8000/docs > /dev/null; then
                echo "Health check passed"
                exit 0
              fi
              echo "Attempt $i failed, retrying in 5s..."
              sleep 5
            done
            echo "Health check failed after 5 attempts"
            docker logs youthfit
            exit 1
        env:
          IMAGE_URI: ${{ steps.build.outputs.image }}
