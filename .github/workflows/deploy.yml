name: Deploy to EC2

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ap-southeast-2

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push Docker image
        run: |
          IMAGE_URI=557809209492.dkr.ecr.ap-southeast-2.amazonaws.com/youthfit:latest
          docker build -t $IMAGE_URI ./backend
          docker push $IMAGE_URI

      - name: Deploy to EC2
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ec2-user
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            aws ecr get-login-password --region ap-southeast-2 | \
              docker login --username AWS --password-stdin \
              557809209492.dkr.ecr.ap-southeast-2.amazonaws.com

            docker pull 557809209492.dkr.ecr.ap-southeast-2.amazonaws.com/youthfit:latest

            docker stop youthfit || true
            docker rm youthfit || true

            docker run -d \
              --name youthfit \
              --restart unless-stopped \
              -p 8000:8000 \
              -v /home/ec2-user/youthfit/backend/data:/app/data \
              --env-file /home/ec2-user/youthfit/backend/.env \
              557809209492.dkr.ecr.ap-southeast-2.amazonaws.com/youthfit:latest
